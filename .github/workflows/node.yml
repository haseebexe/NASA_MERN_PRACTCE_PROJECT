name: NASA project CI

on:
 push: 
  branches: [ main ]
 pull_request: 
  branches: [ main ]

jobs: 
  buid: 
    runs-on: ubuntu-latest
    steps: 
        - uses: actions/checkout@v2
        - name: Use Node.js version 25
          uses: actions/setup-node@v2
          with:
            node-version: '25.0.0'
        - run: npm install
        - run: npm run build --prefix client     